name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          BINARY=invoke-openai-proxy-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
          go build -ldflags "-s -w \
            -X github.com/Pfannkuchensack/openaiapi2invokeai-go/internal/version.Version=${{ github.ref_name }} \
            -X github.com/Pfannkuchensack/openaiapi2invokeai-go/internal/version.Commit=${{ github.sha }} \
            -X github.com/Pfannkuchensack/openaiapi2invokeai-go/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o $BINARY ./cmd/proxy

      - uses: actions/upload-artifact@v4
        with:
          name: invoke-openai-proxy-${{ matrix.goos }}-${{ matrix.goarch }}
          path: invoke-openai-proxy-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: invoke-openai-proxy-*
          generate_release_notes: true
